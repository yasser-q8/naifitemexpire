                background: #f9f9f9 !important;

        // ================================================================
        //  2.  إضافة تواريخ صلاحية افتراضية
        // ================================================================

        function getShelfLife(group) {
            if (group.includes('FROZEN')) return 730;
            if (group.includes('FOOD ITEMS')) return 365;
            if (group.includes('BEVERAGES')) return 365;
            if (group.includes('SPICES')) return 730;
            if (group.includes('BREAD & PASTRY')) return 7;
            if (group.includes('KITCHEN-APPETIZERS')) return 90;
            if (group.includes('KITCHEN-MEAT')) return 180;
            if (group.includes('KITCHEN-VEGS')) return 10;
            if (group.includes('Naif Cafe')) return 365;
            return 365;
        }

        function randomDate(daysAgoMin, daysAgoMax) {
            const now = new Date();
            const daysAgo = Math.floor(Math.random() * (daysAgoMax - daysAgoMin + 1)) + daysAgoMin;
            const d = new Date(now);
            d.setDate(d.getDate() - daysAgo);
            return d;
        }

        let products = rawProducts.map((p, index) => {
            const shelf = getShelfLife(p.group);
            const prod = randomDate(0, 60);
            const exp = new Date(prod);
            exp.setDate(exp.getDate() + shelf);
            return {
                id: index + 1,
                group: p.group,
                code: p.code,
                name: p.name,
                production: prod,
                expiry: exp,
                threshold: 15
            };
        });

        // ================================================================
        //  3.  الدوال الأساسية
        // ================================================================

        function getDaysRemaining(expiry) {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const exp = new Date(expiry);
            exp.setHours(0, 0, 0, 0);
            return Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
        }

        function getAlertStatus(daysRemaining, threshold) {
            if (daysRemaining < 0) return { css: 'expired', text: '⚠️ منتهي' };
            if (daysRemaining <= threshold) return { css: 'danger', text: '🔴 ينتهي قريباً!' };
            if (daysRemaining <= threshold + 15) return { css: 'warning', text: '🟡 قارب الانتهاء' };
            return { css: 'safe', text: '✅ سليم' };
        }

        let currentFilter = 'all';
        let searchTerm = '';

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const filterGroup = document.getElementById('filterGroup');
            const searchInput = document.getElementById('searchInput');

            currentFilter = filterGroup.value;
            searchTerm = searchInput.value.trim().toLowerCase();

            const enriched = products.map(p => {
                const days = getDaysRemaining(p.expiry);
                return { ...p, daysRemaining: days };
            });

            let filtered = enriched;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.group === currentFilter);
            }
            if (searchTerm !== '') {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.code.toLowerCase().includes(searchTerm) ||
                    p.group.toLowerCase().includes(searchTerm)
                );
            }

            filtered.sort((a, b) => a.daysRemaining - b.daysRemaining);

            document.getElementById('countBadge').textContent = `${filtered.length} منتج`;

            let html = '';
            filtered.forEach((p, idx) => {
                const alert = getAlertStatus(p.daysRemaining, p.threshold);
                const rowClass = p.daysRemaining < 0 ? 'row-expired' :
                    p.daysRemaining <= p.threshold ? 'row-warning' : '';

                const prodDate = p.production instanceof Date ? p.production.toISOString().split('T')[0] : p.production;
                const expDate = p.expiry instanceof Date ? p.expiry.toISOString().split('T')[0] : p.expiry;

                html += `
                    <tr class="${rowClass}">
                        <td>${idx + 1}</td>
                        <td><span class="col-group">${p.group}</span></td>
                        <td class="col-code">${p.code}</td>
                        <td class="col-name">${p.name}</td>
                        <td class="col-date">
                            <input type="date" value="${prodDate}" 
                                   onchange="updateProductDate(${p.id}, 'production', this.value)">
                        </td>
                        <td class="col-date">
                            <input type="date" value="${expDate}" 
                                   onchange="updateProductDate(${p.id}, 'expiry', this.value)">
                        </td>
                        <td class="col-days ${p.daysRemaining < 0 ? 'critical' : p.daysRemaining <= p.threshold ? 'warning' : 'good'}">
                            ${p.daysRemaining < 0 ? 'منتهي' : p.daysRemaining + ' يوم'}
                        </td>
                        <td>
                            <span class="alert-box ${alert.css}">${alert.text}</span>
                        </td>
                        <td>
                            <input type="number" class="input-threshold" 
                                   value="${p.threshold}" 
                                   min="0" max="365"
                                   data-id="${p.id}"
                                   onchange="updateThreshold(${p.id}, this.value)">
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html || `<tr><td colspan="9" style="padding:40px;text-align:center;color:#6b7a8f;">لا توجد منتجات مطابقة</td></tr>`;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ar-EG', { hour12: false });
        }

        function updateProductDate(id, field, value) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const newDate = new Date(value + 'T00:00:00');
            if (isNaN(newDate.getTime())) return;
            product[field] = newDate;
            renderTable();
        }

        function updateThreshold(id, value) {
            const val = parseInt(value, 10);
            if (isNaN(val) || val < 0) return;
            const product = products.find(p => p.id === id);
            if (product) {
                product.threshold = val;
                renderTable();
            }
        }

        function resetThresholds() {
            products.forEach(p => p.threshold = 15);
            renderTable();
        }

        function populateGroupFilter() {
            const select = document.getElementById('filterGroup');
            const groups = [...new Set(products.map(p => p.group))].sort();
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                select.appendChild(opt);
            });
        }

        // ================================================================
        //  4.  تصدير PDF
        // ================================================================

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', 'a4');
            const tableElement = document.getElementById('productTable');

            // تحويل الجدول إلى صورة
            const canvas = await html2canvas(tableElement, {
                scale: 2,
                useCORS: true,
                logging: false,
                backgroundColor: '#ffffff'
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const imgWidth = pdf.internal.pageSize.getWidth();
            const imgHeight = (canvas.height * imgWidth) / canvas.width;

            // إضافة صورة الجدول
            pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);

            // إضافة تذييل بسيط (اسم المطعم والتاريخ)
            const restaurant = document.getElementById('restaurantNameInput').value || 'مطعم نايف';
            const dateStr = new Date().toLocaleDateString('ar-EG');
            pdf.setFontSize(10);
            pdf.setTextColor(100);
            pdf.text(`المطعم: ${restaurant}  |  تاريخ التصدير: ${dateStr}`, 40, imgHeight + 30);

            pdf.save('تقرير_الصلاحية.pdf');
        }

        // ================================================================
        //  5.  التهيئة
        // ================================================================

        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-EG', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });

        populateGroupFilter();
        renderTable();

        // تحديث تلقائي كل 60 ثانية
        setInterval(() => {
            renderTable();
        }, 60000);
    </script>

</body>
</html>
