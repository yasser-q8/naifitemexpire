        .header .title-group {

        }

            color: #1e2a3a;

            letter-spacing: 0.5px;
        }
        .header h1 small {

            font-weight: 400;
            color: #6b7a8f;
            display: block;
            margin-top: 4px;
        }
        .header .sub {

            color: #6b7a8f;
            background: #f0f4fa;
            padding: 6px 18px;

        }
        .header .sub strong {
            color: #e63946;
        }

            flex-wrap: wrap;

            padding: 12px 20px;
            border-radius: 14px;
            border: 1px solid #e9edf4;
        }
        .controls label {

            font-size: 14px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            padding: 6px 10px;
            border: 1px solid #d0d8e3;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }

            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-right: auto;
        }

            border: 1px solid #d0d8e3;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
            min-width: 160px;
        }
        .controls .btn-reset {
            background: #e63946;
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls .btn-reset:hover {
            background: #c62836;
        }
        .badge-count {
            background: #e63946;
            color: #fff;
            font-size: 13px;
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 600;
        }

            border-radius: 14px;
            border: 1px solid #e9edf4;
        }

            min-width: 1000px;
        }
        th {

            color: #fff;
            padding: 14px 10px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        td {

            vertical-align: middle;
            text-align: center;
        }
        tr:hover td {
            background: #fafcff;
        }
        .col-group {
            font-size: 12px;
            color: #2c3e50;
            background: #eef3fa;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            white-space: nowrap;

            color: #1e2a3a;
            font-size: 13px;
        }

            text-align: right;
            font-weight: 500;

            font-weight: 700;
            font-size: 16px;
        }
        .col-days.warning {
            color: #e63946;
        }
        .col-days.good {
            color: #2a9d8f;
        }
        .col-days.critical {
            color: #d62828;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .alert-box {
            font-size: 20px;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 80px;
        }
        .alert-box.danger {
            color: #b71c1c;
            background: #ffebee;
            border: 2px solid #d32f2f;
        }
        .alert-box.warning {
            color: #e65100;
            background: #fff3e0;
            border: 2px solid #f57c00;
        }
        .alert-box.safe {
            color: #1b5e20;
            background: #e8f5e9;
            border: 2px solid #388e3c;
        }
        .alert-box.expired {
            color: #880e4f;
            background: #fce4ec;
            border: 2px solid #ad1457;
        }

        .input-threshold {
            width: 70px;
            padding: 5px 6px;
            border: 1px solid #cfd8e6;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;

            background: #fff5f5 !important;
        }
        .row-warning td {
            background: #fffbf0 !important;
        }

            color: #2c3e50;

        .signature-card::before,

                padding: 10px;

            { group: "L-Naif Cafe", code: "L1023", name: "Paper Cup 12oz Blk (جلاس ورق 12 اونص اسود)" },

            { group: "L-Naif Cafe", code: "L1019", name: "Passion Fruit Syrup (شراب بيشن فروت)" },
            { group: "L-Naif Cafe", code: "L1028", name: "Straw Wrapped Black (شاليمون اسود)" },
            { group: "L-Naif Cafe", code: "L1038", name: "Tea powder  ( شاي بودرة)" },
            { group: "L-Naif Cafe", code: "L1025", name: "Transp Cup 14oz (جلاس شفاف 14 اونص)" },

            { group: "L-Naif Cafe", code: "L1014", name: "Vanilla Syrup (شراب الفانيليا)" },
            { group: "L-Naif Cafe", code: "L1010", name: "Whipped cream bottle (كريمة مخفوقة بوتل)" },
            { group: "L-Naif Cafe", code: "L1035", name: "Wood Stirrers 14cm (نمامون الخشب 14 سم)" },
            { group: "L-Naif Cafe", code: "L1036", name: "Wood Stirrers 21cm (نمامون الخشب 21 سم)" }
        ];

        // ============================================================
        //  2.  إضافة تواريخ صلاحية (Production & Expiry) لكل صنف
        //     بناءً على المجموعة
        // ============================================================

        function getShelfLife(group) {
            if (group.includes('FROZEN')) return 730; // 2 سنة
            if (group.includes('FOOD ITEMS')) return 365;
            if (group.includes('BEVERAGES')) return 365;
            if (group.includes('SPICES')) return 730;
            if (group.includes('BREAD & PASTRY')) return 7; // أيام
            if (group.includes('CHEMICALS')) return 1095; // 3 سنوات
            if (group.includes('NON FOOD')) return 1825; // 5 سنوات
            if (group.includes('STATIONARY')) return 1825;
            if (group.includes('EQUIPMENT')) return 1825;
            if (group.includes('KITCHEN-APPETIZERS')) return 90;
            if (group.includes('KITCHEN-MEAT')) return 180;
            if (group.includes('KITCHEN-VEGS')) return 10;
            if (group.includes('Naif Cafe')) return 365;
            return 365; // default
        }

        function randomDate(daysAgoMin, daysAgoMax) {
            const now = new Date();
            const daysAgo = Math.floor(Math.random() * (daysAgoMax - daysAgoMin + 1)) + daysAgoMin;
            const d = new Date(now);
            d.setDate(d.getDate() - daysAgo);
            return d;
        }

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // بناء البيانات الكاملة
        let products = rawProducts.map((p, index) => {
            const shelf = getShelfLife(p.group);
            // تاريخ الإنتاج: قبل 0–60 يوماً
            const prod = randomDate(0, 60);
            const exp = new Date(prod);
            exp.setDate(exp.getDate() + shelf);
            return {
                id: index + 1,
                group: p.group,
                code: p.code,
                name: p.name,
                production: prod,
                expiry: exp,
                shelfDays: shelf,
                threshold: 30 // افتراضي
            };
        });

        // ============================================================
        //  3.  دوال العرض والترتيب والفلترة
        // ============================================================

        function getDaysRemaining(expiry) {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const exp = new Date(expiry);
            exp.setHours(0, 0, 0, 0);
            const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getAlertStatus(daysRemaining, threshold) {
            if (daysRemaining < 0) return { css: 'expired', text: '⚠️ منتهي' };
            if (daysRemaining <= threshold) return { css: 'danger', text: '🔴 ينتهي قريباً!' };
            if (daysRemaining <= threshold + 15) return { css: 'warning', text: '🟡 قارب الانتهاء' };
            return { css: 'safe', text: '✅ سليم' };
        }

        let currentFilter = 'all';
        let searchTerm = '';

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const filterGroup = document.getElementById('filterGroup');
            const searchInput = document.getElementById('searchInput');

            currentFilter = filterGroup.value;
            searchTerm = searchInput.value.trim().toLowerCase();

            // تجميع المنتجات مع الأيام المتبقية
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            const enriched = products.map(p => {
                const days = getDaysRemaining(p.expiry);
                return { ...p, daysRemaining: days };
            });

            // فلتر
            let filtered = enriched;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.group === currentFilter);
            }
            if (searchTerm !== '') {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.code.toLowerCase().includes(searchTerm) ||
                    p.group.toLowerCase().includes(searchTerm)
                );
            }

            // ترتيب: الأيام المتبقية تصاعدياً (الأقرب أولاً)
            filtered.sort((a, b) => a.daysRemaining - b.daysRemaining);

            // تحديث العدد
            document.getElementById('countBadge').textContent = `${filtered.length} منتج`;

            // إنشاء الصفوف
            let html = '';
            filtered.forEach((p, idx) => {
                const alert = getAlertStatus(p.daysRemaining, p.threshold);
                const rowClass = p.daysRemaining < 0 ? 'row-expired' :
                    p.daysRemaining <= p.threshold ? 'row-warning' : '';

                html += `
                    <tr class="${rowClass}">
                        <td>${idx + 1}</td>
                        <td><span class="col-group">${p.group}</span></td>
                        <td class="col-code">${p.code}</td>
                        <td class="col-name">${p.name}</td>
                        <td class="col-date">${formatDate(p.production)}</td>
                        <td class="col-date">${formatDate(p.expiry)}</td>
                        <td class="col-days ${p.daysRemaining < 0 ? 'critical' : p.daysRemaining <= p.threshold ? 'warning' : 'good'}">
                            ${p.daysRemaining < 0 ? 'منتهي' : p.daysRemaining + ' يوم'}
                        </td>
                        <td>
                            <span class="alert-box ${alert.css}">${alert.text}</span>
                        </td>
                        <td>
                            <input type="number" class="input-threshold" 
                                   value="${p.threshold}" 
                                   min="0" max="365"
                                   data-id="${p.id}"
                                   onchange="updateThreshold(${p.id}, this.value)">
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html || `<tr><td colspan="9" style="padding:40px;text-align:center;color:#6b7a8f;">لا توجد منتجات مطابقة</td></tr>`;

            // تحديث وقت آخر تحديث
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ar-EG', { hour12: false });
        }

        // ============================================================
        //  4.  تحديث قيمة التنبيه لكل منتج
        // ============================================================

        function updateThreshold(id, value) {
            const val = parseInt(value, 10);
            if (isNaN(val) || val < 0) return;
            const product = products.find(p => p.id === id);
            if (product) {
                product.threshold = val;
                renderTable(); // إعادة الرسم لتحديث التنبيهات
            }
        }

        // ============================================================
        //  5.  إعادة ضبط جميع التنبيهات إلى 30
        // ============================================================

        function resetThresholds() {
            products.forEach(p => p.threshold = 30);
            renderTable();
        }

        // ============================================================
        //  6.  ملء قائمة التصنيفات في الفلتر
        // ============================================================

        function populateGroupFilter() {
            const select = document.getElementById('filterGroup');
            const groups = [...new Set(products.map(p => p.group))].sort();
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                select.appendChild(opt);
            });
        }

        // ============================================================
        //  7.  تهيئة التاريخ الحالي
        // ============================================================

        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-EG', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });

        // ============================================================
        //  8.  التشغيل النهائي
        // ============================================================

        populateGroupFilter();
        renderTable();

        // إعادة الرسم عند تغيير الفلتر أو البحث (يتم استدعاؤها عبر oninput/onchange)
        // تم ربطها في HTML

        // ============================================================
        //  9.  (اختياري) تحديث تلقائي كل 60 ثانية
        // ============================================================

        setInterval(() => {
            renderTable();
        }, 60000);
    </script>
